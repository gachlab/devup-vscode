name: CI

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

env:
  # Opt into Node 24 for actions/upload-artifact (silences the Node 20
  # deprecation notice that lands across all v4 actions until upstream
  # cuts a Node-24-native release).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Package (vsix)
        run: npx --yes @vscode/vsce@latest package --no-dependencies --skip-license --out devup-vscode.vsix
      # retention-days omitted on purpose: the gachlab org caps artifact retention
      # at 1 day, so any explicit value emits a warning. Bump it via
      # Settings → Actions → General → Artifact and log retention if you want longer.
      - name: Upload .vsix
        uses: actions/upload-artifact@v4
        with:
          name: devup-vscode-${{ github.sha }}
          path: devup-vscode.vsix
          if-no-files-found: error
