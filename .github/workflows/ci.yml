name: CI

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Package (vsix)
        run: npx --yes @vscode/vsce@latest package --no-dependencies --skip-license --out devup-vscode.vsix
      - name: Upload .vsix
        uses: actions/upload-artifact@v4
        with:
          name: devup-vscode-${{ github.sha }}
          path: devup-vscode.vsix
          retention-days: 30
          if-no-files-found: error
