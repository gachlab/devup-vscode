name: CI

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Package (vsix)
        run: npx --yes @vscode/vsce@latest package --no-dependencies --skip-license
